version: "3.8"

services:
  # ---- 后端 API 服务 ----
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: rf-server
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      PORT: "8080"
      DATABASE_URL: "file:./data/restaurant_finance.db"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES:-2h}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES:-30d}
      COS_SECRET_ID: ${COS_SECRET_ID}
      COS_SECRET_KEY: ${COS_SECRET_KEY}
      COS_BUCKET: ${COS_BUCKET}
      COS_REGION: ${COS_REGION}
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
    volumes:
      - sqlite_data:/app/prisma/data
    restart: unless-stopped

  # ---- Web 前端（Nginx + React） ----
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: rf-web
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  sqlite_data:
